<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0c0c10" />
    <title>Hypercasual — prototype</title>
  </head>
  <body>
    <div id="app">
      <div id="game-viewport" aria-label="Game view">
        <div id="hud-hit-flash" class="hud-hit-flash" aria-hidden="true"></div>
        <div id="hud-power-tint" class="hud-power-tint" aria-hidden="true"></div>
        <div id="hud-top" class="hud-top" aria-live="polite">
          <div class="hud-main-row">
            <span id="hud-carry" class="hud-stat hud-stat--carry">0 / 10</span>
            <div
              id="hud-power-timer"
              class="hud-power-timer hud-power-timer--idle"
              aria-hidden="true"
            >
              <div
                id="hud-power-timer-track"
                class="hud-power-timer__track"
                role="progressbar"
                aria-valuemin="0"
                aria-valuemax="100"
                aria-valuenow="0"
                aria-label="Ghost pulse charge"
              >
                <div class="hud-power-timer__fill" id="hud-power-timer-fill"></div>
              </div>
            </div>
            <span id="hud-money" class="hud-stat hud-stat--money">$0</span>
          </div>
        </div>
        <div id="hud-quest" class="hud-quest" hidden aria-live="polite">
          <div class="hud-quest__title">Quest — deposit at hub</div>
          <div id="hud-quest-relic" class="hud-quest__line">Relic: 0 / 1</div>
          <div id="hud-quest-red" class="hud-quest__line">Red gems: 0 / 2</div>
          <div id="hud-quest-blue" class="hud-quest__line">Blue gems: 0 / 1</div>
        </div>
        <div id="hud-idle-hint" class="hud-idle-hint hidden" aria-live="polite">
          Drag to move
        </div>
        <div id="hud-bottom" class="hud-bottom" aria-live="polite">
          <div id="hud-spawn" class="hud-spawn"></div>
          <div class="hud-bottom-pulse">
            <button
              type="button"
              id="hud-pulse-btn"
              class="hud-pulse-btn"
              aria-label="Hold for ghost pulse power"
            >
              <span class="hud-pulse-btn__sheen" aria-hidden="true"></span>
              <span class="hud-pulse-btn__inner">
                <span class="hud-pulse-btn__icon" aria-hidden="true">⚡</span>
                <span class="hud-pulse-btn__label">Pulse</span>
              </span>
            </button>
          </div>
        </div>
        <div id="hud-overload" class="hud-overload hidden" aria-live="polite">
          <div class="hud-overload-label">OVERLOAD</div>
          <div class="hud-overload-amount"></div>
        </div>
        <div id="hud-deposit-toast" class="deposit-toast hidden" aria-live="polite">
          <div class="deposit-amount"></div>
          <div class="deposit-hint"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
