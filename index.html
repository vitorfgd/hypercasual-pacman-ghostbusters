<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0c0c10" />
    <title>Hypercasual — prototype</title>
  </head>
  <body>
    <div id="app">
      <div
        id="game-loading"
        class="game-loading"
        role="status"
        aria-live="polite"
        aria-label="Loading"
      >
        <p class="game-loading__text">Tidying the cemetery...</p>
      </div>
      <div id="game-viewport" aria-label="Game view">
        <div id="hud-hit-flash" class="hud-hit-flash" aria-hidden="true"></div>
        <div id="hud-top" class="hud-top" aria-live="polite">
          <div class="hud-main-row">
            <span id="hud-carry" class="hud-stat hud-stat--carry">0 / 10</span>
            <span
              id="hud-camera-hint"
              class="hud-stat hud-stat--cam"
              aria-label="Camera: far view. Press C for near view."
              >C · far</span>
            <span id="hud-money" class="hud-stat hud-stat--money">$0</span>
          </div>
          <div
            id="hud-room-clean"
            class="hud-room-clean hud-room-clean--inactive"
            aria-label="Room cleanliness"
          >
            <div class="hud-room-clean__row">
              <span id="hud-room-clean-title" class="hud-room-clean__title">Room</span>
              <span id="hud-room-clean-pct" class="hud-room-clean__pct">—</span>
            </div>
            <div
              class="hud-room-clean__track"
              role="progressbar"
              aria-valuemin="0"
              aria-valuemax="100"
              aria-valuenow="0"
              aria-label="Cleanliness"
            >
              <div class="hud-room-clean__fill" id="hud-room-clean-fill"></div>
            </div>
          </div>
        </div>
        <div id="hud-stack-vignette" class="hud-stack-vignette" aria-hidden="true"></div>
        <div id="hud-stack-hum" class="hud-stack-hum" aria-hidden="true"></div>
        <div id="hud-bottom" class="hud-bottom" aria-live="polite">
          <div class="hud-dispose-wrap" aria-hidden="true">
            <button
              type="button"
              id="hud-dispose-bag"
              class="hud-dispose-bag"
              aria-label="Toss bag and cash in"
            >
              <span class="hud-dispose-bag__glow" aria-hidden="true"></span>
              <span class="hud-dispose-bag__label">TOSS &amp; CASH IN</span>
            </button>
          </div>
          <div id="hud-spawn" class="hud-spawn"></div>
        </div>
        <div id="hud-overload" class="hud-overload hidden" aria-live="polite">
          <div class="hud-overload-label">OVERLOAD</div>
          <div class="hud-overload-amount"></div>
        </div>
        <div id="hud-deposit-toast" class="deposit-toast hidden" aria-live="polite">
          <div class="deposit-amount"></div>
          <div class="deposit-hint"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
